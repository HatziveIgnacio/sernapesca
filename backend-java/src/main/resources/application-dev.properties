# Dev profile using H2 in-memory DB
spring.datasource.url=jdbc:h2:mem:sernapesca;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Header name used by upstream portal to pass authenticated user's RUT (provisional)
app.auth.header-name=X-User-Rut

# JWT (dev)
app.jwt.secret=dev-secret-should-be-changed-32-bytes-minimum!
app.jwt.expiration-ms=86400000

# Reduce logging noise
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
