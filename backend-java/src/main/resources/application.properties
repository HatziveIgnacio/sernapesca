server.port=8080

# CORS - permite peticiones desde el frontend Angular
spring.web.cors.allowed-origins=http://localhost:4200,http://localhost:4201

# Limite de tamanio para subida de archivos (plantillas y reportes pueden ser grandes)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Directorio donde se guardan los archivos subidos
app.storage.path=./storage

# Database (SQL Server container)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=sernapesca;encrypt=false
spring.datasource.username=sa
spring.datasource.password=TuPassword123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
app.jwt.secret=claveLocalDeDesarrollo_MUY_SECRETA_PARA_CAMBIAR
app.jwt.expiration-ms=86400000

# External auth API (placeholder)
app.auth.external-url=https://api.externa.auth/validate

# Header name used by upstream portal to pass authenticated user's RUT (provisional)
app.auth.header-name=X-User-Rut

