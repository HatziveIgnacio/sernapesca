<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Ingresar - SERNAPESCA (Static)</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&family=Roboto+Slab:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/gob.cl.css">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>
  <header class="navbar">
    <a class="navbar-brand" href="#">SERNAPESCA</a>
  </header>

  <main role="main" class="container-fluid d-flex align-items-center" style="min-height: calc(100vh - 64px - 100px);">
    <div class="row w-100">
      <div class="col-md-5 bg-primary text-white p-5 d-flex flex-column justify-content-center">
        <h1 class="h2 mb-3">SERNAPESCA</h1>
        <p class="lead">Sistema de Gestión de Laboratorios</p>
        <hr class="bg-white">
        <p class="small">Acceso exclusivo para laboratorios autorizados.</p>
      </div>

      <div class="col-md-7 p-5">
        <div class="row justify-content-center">
          <div class="col-md-8">
            <h2 class="h4 mb-4">Iniciar Sesión</h2>

            <form id="login-form" method="POST" action="/api/auth/login" novalidate>
              <div class="form-group">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" name="email" required>
                <small class="form-text text-muted">Usa tu correo institucional</small>
              </div>

              <div class="form-group">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" required>
              </div>

              <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                <label class="form-check-label" for="remember">Recuérdame</label>
              </div>

              <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
            </form>

            <hr>
            <p class="text-center small">
              <a href="/recuperar">¿Olvidaste tu contraseña?</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="p-4 text-center bg-light">&copy; SERNAPESCA</footer>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
