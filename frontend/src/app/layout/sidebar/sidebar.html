<aside class="sidebar" aria-label="Navegación secundaria">
  <div class="sidebar-header">
    <p class="sidebar-kicker">SERNAPESCA</p>
    <h2>Sistema Central</h2>
    <span class="line line-primary" aria-hidden="true"></span>
  </div>

  <nav class="sidebar-nav">
    <a routerLink="/dashboard" routerLinkActive="active" #dashboardLink="routerLinkActive" [attr.aria-current]="dashboardLink.isActive ? 'page' : null" class="nav-item">
      <span class="cl cl-list" aria-hidden="true"></span>
      <span>Dashboard</span>
    </a>
    <a routerLink="/registros" routerLinkActive="active" #registrosLink="routerLinkActive" [attr.aria-current]="registrosLink.isActive ? 'page' : null" class="nav-item">
      <span class="cl cl-document-verified" aria-hidden="true"></span>
      <span>Registros</span>
    </a>
    <a routerLink="/validacion" routerLinkActive="active" #validacionLink="routerLinkActive" [attr.aria-current]="validacionLink.isActive ? 'page' : null" class="nav-item">
      <span class="cl cl-ok" aria-hidden="true"></span>
      <span>Validación</span>
    </a>
    <a routerLink="/reportes" routerLinkActive="active" #reportesLink="routerLinkActive" [attr.aria-current]="reportesLink.isActive ? 'page' : null" class="nav-item">
      <span class="cl cl-computer" aria-hidden="true"></span>
      <span>Reportes</span>
    </a>
    <a routerLink="/laboratorios" routerLinkActive="active" #labsLink="routerLinkActive" [attr.aria-current]="labsLink.isActive ? 'page' : null" class="nav-item">
      <span class="cl cl-briefcase" aria-hidden="true"></span>
      <span>Laboratorios</span>
    </a>
    <a routerLink="/plantillas" routerLinkActive="active" #plantillasLink="routerLinkActive" [attr.aria-current]="plantillasLink.isActive ? 'page' : null" class="nav-item">
      <span class="cl cl-download" aria-hidden="true"></span>
      <span>Plantillas</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <a routerLink="/soporte" routerLinkActive="active" #soporteLink="routerLinkActive" [attr.aria-current]="soporteLink.isActive ? 'page' : null" class="nav-item">
      <span class="cl cl-question" aria-hidden="true"></span>
      <span>Soporte</span>
    </a>
    <a routerLink="/login" class="nav-item logout">
      <span class="cl cl-logout" aria-hidden="true"></span>
      <span>Cerrar Sesión</span>
    </a>
  </div>
</aside>
